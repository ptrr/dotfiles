# status bar
set-option -g status-utf8 on


# https://github.com/seebi/tmux-colors-solarized/blob/master/tmuxcolors-256.conf
set-option -g status-bg colour0  #base02
set-option -g status-fg white #yellow
set-option -g status-attr default

# default window title colors
set-window-option -g window-status-fg colour244 #base0
set-window-option -g window-status-bg default

setw -g window-status-format "#[fg=colour10]#[bg=default]⮃ #i #W "
setw -g window-status-current-format "#[fg=colour11 bg=colour0]⮂#[bg=colour11 fg=colour0]*#I#[fg=colour0]#[bg=colour11] [#W] #[fg=colour0]⮂"

#set-window-option -g window-status-attr dim

# active window title colors
set-window-option -g window-status-current-fg colour06 #orange
set-window-option -g window-status-current-bg colour0
#set-window-option -g window-status-current-attr bright
set-option -gw window-status-activity-attr bold
set-option -gw window-status-activity-bg default
set-option -gw window-status-activity-fg red

# pane border
set-option -g pane-border-fg colour2 #base02
set-option -g pane-active-border-fg colour1 #base01

# message text
set-option -g message-bg colour235 #base02
set-option -g message-fg colour06 #orange

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour06 #orange

# clock
set-window-option -g clock-mode-colour green #green

set -g status-interval 1
set -g status-justify centre # center align window list
set -g status-left-length 140
set -g status-right-length 140
set-option -g status-left "#(~/.dotfiles/tmux-powerline/powerline.sh left)"
set-option -g status-right "#(~/.dotfiles/tmux-powerline/powerline.sh right)"

# C-b is not acceptable -- Vim uses it
set-option -g prefix C-g
bind-key C-g last-window

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition
set -s escape-time 0

# Rather than constraining window size to the maximum size of any client 
# connected to the *session*, constrain window size to the maximum size of any 
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside 
# another TMUX session
bind-key a send-prefix

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# Highlight active window
#set-window-option -g window-status-current-bg red

# Vi copypaste mode
set-window-option -g mode-keys vi
bind-key -t vi-copy 'v' begin-selection
bind-key -t vi-copy 'y' copy-selection

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# auto window rename
set-window-option -g automatic-rename

# rm mouse mode fail
set -g mode-mouse off

# color
set -g default-terminal "screen-256color"
